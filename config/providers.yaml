# config/providers.yaml
# ─────────────────────────────────────────────────────────────
# All API limits live here. If Google/Groq changes their free
# tier, update the numbers here — no code changes needed.
# ─────────────────────────────────────────────────────────────

youtube:
  daily_units: 10000
  reset_timezone: "US/Pacific"   # YouTube quota resets at PT midnight

  # Cost of each operation in quota units
  unit_costs:
    channels_list: 1
    playlist_items_list: 1
    videos_list: 1
    videos_insert: 1600
    videos_update: 50
    playlist_items_insert: 50
    reports_query: 1              # YouTube Analytics

gemini:
  reset_timezone: "US/Pacific"   # Gemini quota resets at PT midnight
  models:
    - name: "gemini-2.5-flash"
      tier: 1                    # Lower = higher priority
      rpm: 10
      rpd: 250
      tpm: 250000
      stable: true

    - name: "gemini-2.5-flash-lite"
      tier: 2
      rpm: 15
      rpd: 1000
      tpm: 250000
      stable: true

    # ── Last resort only ────────────────────────────────────
    - name: "gemini-2.5-pro"
      tier: 10
      rpm: 5
      rpd: 100
      tpm: 250000
      stable: false              # Kept for absolute emergency

groq:
  reset_timezone: "UTC"          # Groq quota resets at UTC midnight
  models:
    - name: "llama-3.3-70b-versatile"
      tier: 3
      rpm: 30
      rpd: 14400
      stable: true

    - name: "llama-3.1-8b-instant"
      tier: 4
      rpm: 30
      rpd: 14400
      stable: true
