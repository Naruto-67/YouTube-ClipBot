# config/prompts.yaml
# ─────────────────────────────────────────────────────────────
# All AI prompts live here. Tweak without touching code.
# ─────────────────────────────────────────────────────────────

clip_selector:
  system: |
    You are an expert YouTube Shorts editor who identifies the most viral-worthy
    moments in long-form creator videos. You understand what makes viewers stop
    scrolling: genuine funny reactions, shocking outcomes, intense challenges,
    emotional moments, and satisfying conclusions.

  user: |
    VIDEO TITLE: {title}
    CREATOR: {creator}
    DURATION: {duration_seconds} seconds

    TRANSCRIPT (format: [timestamp_seconds] text):
    {transcript}

    ─────────────────────────────────────────────────────────
    Find the {num_clips} best clips for YouTube Shorts.

    STRICT RULES:
    1. Each clip: between {min_seconds}s and {max_seconds}s long
    2. NEVER start mid-sentence — start at the beginning of a new thought/moment
    3. NEVER end mid-sentence — end at a natural pause or conclusion
    4. Each clip must be SELF-CONTAINED — makes sense without seeing the rest
    5. Prioritize: funny reactions, shocking reveals, challenge outcomes, emotional peaks
    6. No two clips can overlap in time
    7. confidence must reflect how genuinely viral-worthy this clip is (0.0–1.0)

    Return ONLY valid JSON, no preamble, no markdown fences:
    {{
      "clips": [
        {{
          "start_seconds": 45.2,
          "end_seconds": 88.7,
          "clip_type": "funny",
          "hook_text": "max 10 words for voiceover intro",
          "confidence": 0.85,
          "reason": "one sentence: why this moment is viral-worthy"
        }}
      ]
    }}

    clip_type must be one of: funny, shocking, emotional, challenge, reaction, satisfying

seo_generator:
  system: |
    You are a YouTube Shorts SEO expert who writes metadata that gets maximum
    reach in the US market. You know what titles get clicked and what tags get
    recommended.

  user: |
    CREATOR: {creator}
    CLIP TYPE: {clip_type}
    CLIP REASON: {clip_reason}
    HOOK TEXT: {hook_text}
    TRANSCRIPT EXCERPT: {transcript_excerpt}

    Write YouTube Shorts metadata. Rules:
    1. Title: under 55 characters, punchy, must end with #shorts
    2. Description: 2 sentences max — what happens + call to action
    3. Tags: exactly 12 tags, mix of broad and specific, NO # symbol in tags
    4. Do NOT use clickbait phrases like "you won't believe" or "goes wrong"

    Return ONLY valid JSON:
    {{
      "title": "...",
      "description": "...",
      "tags": ["tag1", "tag2", ...]
    }}

quality_checker:
  system: |
    You are a strict YouTube content quality checker. You review metadata
    for accuracy, policy compliance, and quality issues.

  user: |
    Review this YouTube Shorts metadata for issues:

    TITLE: {title}
    DESCRIPTION: {description}
    TAGS: {tags}
    TRANSCRIPT EXCERPT: {transcript_excerpt}

    Check for:
    1. Title length (must be under 60 chars including #shorts)
    2. Misleading claims not supported by transcript
    3. Banned/demonetizing words (violence, hate, adult content)
    4. Tags containing # symbols
    5. Empty or placeholder text

    Return ONLY valid JSON:
    {{
      "passed": true,
      "issues": [],
      "fixed_title": "corrected title if needed, else same",
      "fixed_description": "corrected description if needed, else same",
      "fixed_tags": ["corrected tags array if needed, else same"]
    }}
